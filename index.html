<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CINESTASH — your personal stash of every film you've ever watched." />
  <meta name="theme-color" content="#0a0a0f" />
  <title>CINESTASH</title>
  <link rel="preconnect" href="https://image.tmdb.org" />
  <link rel="preconnect" href="https://api.themoviedb.org" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
</head>
<body>
  <!-- ░░ Top Navigation ░░ -->
  <header class="nav" id="nav">
    <div class="nav__inner">
      <a class="brand" href="#/" data-link aria-label="CINESTASH home">
        <span class="brand__mark">◆</span>
        <span class="brand__name">CINE<em>STASH</em></span>
      </a>

      <form class="search" id="navSearch" role="search" autocomplete="off">
        <svg class="search__icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 21l-4.3-4.3M11 19a8 8 0 110-16 8 8 0 010 16z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input class="search__input" id="navSearchInput" type="search" placeholder="Search every film ever made…" aria-label="Search films" />
        <kbd class="search__kbd">/</kbd>
      </form>

      <nav class="nav__links">
        <a href="#/" data-link class="nav__link" data-route="home" title="Profile">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zM4 20a8 8 0 0116 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>Profile</span>
        </a>
        <a href="#/watchlist" data-link class="nav__link" data-route="watchlist" title="Watchlist">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h12a1 1 0 011 1v15l-7-4-7 4V5a1 1 0 011-1z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          <span>Watchlist</span>
        </a>
        <a href="#/diary" data-link class="nav__link" data-route="diary" title="Diary">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5a2 2 0 012-2h11a1 1 0 011 1v16a1 1 0 01-1 1H6a2 2 0 01-2-2V5zM8 3v18" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          <span>Diary</span>
        </a>
        <button class="nav__link nav__icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.6 1.6 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.6 1.6 0 00-1.8-.3 1.6 1.6 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.6 1.6 0 00-1-1.5 1.6 1.6 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.6 1.6 0 00.3-1.8 1.6 1.6 0 00-1.5-1H3a2 2 0 110-4h.1a1.6 1.6 0 001.5-1 1.6 1.6 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.6 1.6 0 001.8.3H9a1.6 1.6 0 001-1.5V3a2 2 0 114 0v.1a1.6 1.6 0 001 1.5 1.6 1.6 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.6 1.6 0 00-.3 1.8V9a1.6 1.6 0 001.5 1H21a2 2 0 110 4h-.1a1.6 1.6 0 00-1.5 1z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- ░░ Main routed view ░░ -->
  <main id="app" class="app"></main>

  <!-- ░░ Movie detail modal ░░ -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-modal="true" id="modalPanel"></div>
  </div>

  <!-- ░░ Toast ░░ -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
