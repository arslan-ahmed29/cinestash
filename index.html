<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="CINESTASH — your personal stash of every film you've ever watched." />
  <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <title>CINESTASH</title>

  <!-- ░░ Installable home-screen app (PWA) ░░ -->
  <link rel="manifest" href="./manifest.json?v=cb5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CineStash" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="./icons/icon-167.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="./icons/icon-120.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />

  <link rel="preconnect" href="https://image.tmdb.org" />
  <link rel="preconnect" href="https://api.themoviedb.org" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css?v=cb5" />
</head>
<body>
  <!-- ░░ Nav ░░ -->
  <header class="nav" id="nav">
    <div class="nav__inner">
      <a class="brand" href="#/" data-link aria-label="CINESTASH home">
        <!-- film reel SVG logo -->
        <svg class="brand__logo" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="36" height="36" rx="9" fill="#FF2D55"/>
          <!-- neon marquee sign body -->
          <rect x="8.5" y="10.5" width="19" height="13" rx="2.2" stroke="white" stroke-width="1.6" fill="none"/>
          <!-- marquee bulbs (top + bottom rows) -->
          <circle cx="12" cy="10.5" r="1.05" fill="white"/>
          <circle cx="18" cy="10.5" r="1.05" fill="white"/>
          <circle cx="24" cy="10.5" r="1.05" fill="white"/>
          <circle cx="12" cy="23.5" r="1.05" fill="white"/>
          <circle cx="18" cy="23.5" r="1.05" fill="white"/>
          <circle cx="24" cy="23.5" r="1.05" fill="white"/>
          <!-- "now showing" play triangle -->
          <path d="M16 14.2l5 2.8-5 2.8z" fill="white"/>
          <!-- sign posts -->
          <line x1="14" y1="23.5" x2="14" y2="28.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="22" y1="23.5" x2="22" y2="28.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span class="brand__name">CINE<em>STASH</em></span>
      </a>

      <form class="search" id="navSearch" role="search" autocomplete="off">
        <svg class="search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input class="search__input" id="navSearchInput" type="search" placeholder="Search every film ever made…" aria-label="Search films" />
        <kbd class="search__kbd">/</kbd>
      </form>

      <nav class="nav__links" role="navigation" aria-label="Main">
        <div class="nav__routes">
        <a href="#/" data-link class="nav__link" data-route="home" title="Profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Profile</span>
        </a>
        <a href="#/friends" data-link class="nav__link" data-route="friends" title="Friends">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          <span>Friends</span>
        </a>
        <a href="#/theaters" data-link class="nav__link" data-route="theaters" title="In Theaters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">
            <rect x="2" y="7" width="15" height="13" rx="2"/><path d="M17 10l5-3v10l-5-3z"/>
          </svg>
          <span>Theaters</span>
        </a>
        <a href="#/watchlist" data-link class="nav__link" data-route="watchlist" title="Watchlist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
          </svg>
          <span>Watchlist</span>
        </a>
        <a href="#/diary" data-link class="nav__link" data-route="diary" title="Diary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
          </svg>
          <span>Diary</span>
        </a>
        </div>

        <!-- theme toggle -->
        <button class="nav__link nav__icon-btn" id="themeBtn" aria-label="Toggle theme">
          <!-- filled by themes.js -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>

        <button class="nav__link nav__icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- ░░ Mobile bottom tab bar (shown ≤600px) ░░ -->
  <nav class="tabbar" role="navigation" aria-label="Primary">
    <a href="#/" data-link class="nav__link" data-route="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
    <a href="#/friends" data-link class="nav__link" data-route="friends">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      <span>Friends</span>
    </a>
    <a href="#/theaters" data-link class="nav__link" data-route="theaters">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true"><rect x="2" y="7" width="15" height="13" rx="2"/><path d="M17 10l5-3v10l-5-3z"/></svg>
      <span>Theaters</span>
    </a>
    <a href="#/watchlist" data-link class="nav__link" data-route="watchlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" aria-hidden="true"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
      <span>Watchlist</span>
    </a>
    <a href="#/diary" data-link class="nav__link" data-route="diary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" aria-hidden="true"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
      <span>Diary</span>
    </a>
  </nav>

  <!-- ░░ Main ░░ -->
  <main id="app" class="app"></main>

  <!-- ░░ Modal ░░ -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-modal="true" id="modalPanel"></div>
  </div>

  <!-- ░░ Toast ░░ -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./js/app.js?v=cb5"></script>
</body>
</html>
